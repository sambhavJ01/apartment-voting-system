# nginx/nginx.conf
#
# Reverse proxy configuration for the Apartment Voting System.
#
# Topology (Docker Compose):
#   nginx (port 80) ──▶ frontend:8501  (Streamlit)
#   nginx (port 8000) ─▶ backend:8000  (FastAPI / Gunicorn)
#
# For horizontal scaling, add more backend upstreams:
#   upstream voting_api {
#       least_conn;
#       server backend1:8000;
#       server backend2:8000;
#   }

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    gzip                on;
    gzip_types          application/json text/plain;
    client_max_body_size 2m;

    # ── Connection limiting (rate abuse protection) ───────────────────────────
    # Allow max 20 new connections/s per IP; burst of 50 queued without error.
    limit_conn_zone   $binary_remote_addr zone=per_ip:10m;
    limit_req_zone    $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # ── FastAPI backend upstream ──────────────────────────────────────────────
    upstream voting_api {
        least_conn;                  # route to least-busy worker
        server backend:8000;
        keepalive 32;                # keep 32 idle connections to backend
    }

    # ── Streamlit frontend upstream ───────────────────────────────────────────
    upstream voting_ui {
        server frontend:8501;
        keepalive 8;
    }

    # ── FastAPI on port 8000 (API endpoint) ───────────────────────────────────
    server {
        listen 8000;
        server_name _;

        limit_conn per_ip   20;      # max 20 simultaneous conns per IP
        limit_req  zone=api_limit burst=50 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Connection "";          # enable HTTP/1.1 keep-alive
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  5s;
        proxy_send_timeout    15s;
        proxy_read_timeout    15s;

        location / {
            proxy_pass http://voting_api;
        }

        # Health check — bypass rate limits
        location /health {
            limit_req off;
            proxy_pass http://voting_api/health;
        }
    }

    # ── Streamlit on port 80 (UI) ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Streamlit needs WebSocket support for hot-updates
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;

        proxy_read_timeout 3600s;   # keep WS alive

        location / {
            proxy_pass http://voting_ui;
        }
    }
}
